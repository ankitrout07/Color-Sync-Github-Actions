name: Color Sync Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch: # This allows you to run it manually for testing!

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t color-sync-app:latest .

      - name: Deploy Container
        run: |
          # Force remove any existing container with this name
          docker rm -f color-sync-container || true
          
          # Run the new container and wait 5 seconds to ensure it stays up
          docker run -d --name color-sync-container -p 8080:3000 color-sync-app:latest
          
          # Validation: Check if it is actually running
          sleep 5
          docker ps -f name=color-sync-container