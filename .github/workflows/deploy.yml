name: Deploy Color-Sync
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t color-sync-app:latest .

      - name: Production Deployment
        run: |
          # Kill old instance
          docker rm -f color-sync-container || true
          # Run new instance
          docker run -d \
            --name color-sync-container \
            --restart always \
            -p 8080:3000 \
            color-sync-app:latest

      - name: Validation
        run: |
          sleep 3
          docker ps -f name=color-sync-container