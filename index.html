<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Color-Sync CI/CD Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-slow { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .accent-glow { box-shadow: 0 0 20px rgba(99, 102, 241, 0.3); }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex items-center justify-center p-6">
    <div class="glass max-w-2xl w-full rounded-3xl p-8 accent-glow border-t-4 border-indigo-500">
        <div class="flex justify-between items-start mb-8">
            <div>
                <h1 class="text-3xl font-bold bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">
                    Color-Sync Dashboard
                </h1>
                <p class="text-slate-400 text-sm mt-1">Real-time CI/CD Pipeline Status</p>
            </div>
            <span class="flex items-center gap-2 px-3 py-1 rounded-full bg-emerald-500/10 text-emerald-400 text-xs font-mono border border-emerald-500/20">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                LIVE ON NTZ-LINUX-003
            </span>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="p-4 rounded-2xl bg-slate-900/50 border border-slate-800">
                <p class="text-slate-500 text-xs uppercase font-bold tracking-wider">Primary Theme</p>
                <div class="flex items-center gap-3 mt-2">
                    <div class="w-8 h-8 rounded-lg bg-indigo-500 shadow-[0_0_10px_rgba(99,102,241,0.5)]"></div>
                    <span class="font-mono text-indigo-300">#6366f1</span>
                </div>
            </div>
            <div class="p-4 rounded-2xl bg-slate-900/50 border border-slate-800">
                <p class="text-slate-500 text-xs uppercase font-bold tracking-wider">Build Version</p>
                <p class="text-xl font-mono text-cyan-400 mt-1">v2.1.0-stable</p>
            </div>
        </div>

        <div class="space-y-4">
            <div class="flex justify-between text-sm">
                <span class="text-slate-400 italic font-serif">"Push code to GitHub to trigger the sync..."</span>
                <span class="text-indigo-400 font-bold hover:underline cursor-pointer">View Actions Logs →</span>
            </div>
            <div class="h-2 w-full bg-slate-800 rounded-full overflow-hidden">
                <div class="h-full bg-indigo-500 w-full shadow-[0_0_15px_rgba(99,102,241,0.6)]"></div>
            </div>
        </div>

        <footer class="mt-8 pt-6 border-t border-slate-800 text-center">
            <p class="text-xs text-slate-500">
                Infrastructure: <span class="text-slate-300">Ubuntu LTS</span> | 
                Engine: <span class="text-slate-300">Docker</span> | 
                Orchestration: <span class="text-slate-300">GitHub Actions</span>
            </p>
        </footer>
    </div>
</body>
</html>
